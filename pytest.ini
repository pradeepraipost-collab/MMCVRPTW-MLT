[pytest]
# Each test runs in a fresh subprocess via pytest-forked. This eliminates
# cross-test state pollution — highspy's global state, file handles, and
# memory pressure from earlier tests can't poison later tests. Necessary
# because S3 was passing alone but failing in the suite due to leftover
# state from S1/S2's giant models.
addopts = --forked
testpaths = backend/tests
